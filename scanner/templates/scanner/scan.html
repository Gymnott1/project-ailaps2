{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan License Plate - License Plate Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}" style="display: none;">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background-color: #343a40;
        }
        .navbar-brand {
            color: white !important;
            font-weight: bold;
        }
        .nav-link {
            color: rgba(255,255,255,0.8) !important;
        }
        .nav-link:hover {
            color: white !important;
        }
        .scan-container {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .camera-container {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
            position: relative;
        }
        #videoElement {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .scan-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 30%;
            border: 2px solid #0d6efd;
            border-radius: 10px;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .scan-overlay.detected {
            border-color: #28a745;
            box-shadow: 0 0 30px rgba(40, 167, 69, 0.8);
            animation: blink 0.5s ease-in-out infinite;
        }
        .scan-overlay.not-detected {
            border-color: #dc3545;
            box-shadow: 0 0 30px rgba(220, 53, 69, 0.8);
            animation: blink 0.5s ease-in-out infinite;
        }
        @keyframes blink {
            0% { 
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            50% { 
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(1.05);
            }
            100% { 
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        .scan-button {
            padding: 15px 30px;
            font-size: 1.2rem;
            margin: 20px 0;
        }
        .result-container {
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
            display: none;
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .result-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .result-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #343a40;
        }
        .result-info {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        .status-badge {
            font-size: 1.1rem;
            padding: 8px 15px;
            border-radius: 20px;
            margin-left: 10px;
        }
        .status-badge.insured {
            background-color: #d4edda;
            color: #155724;
        }
        .status-badge.not-insured {
            background-color: #f8d7da;
            color: #721c24;
        }
        .loading-spinner {
            display: none;
            margin: 20px 0;
        }
        #scanningStatus {
            font-size: 1.2rem;
            margin: 10px 0;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'scanner:home' %}">License Plate Scanner</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'scanner:home' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'scanner:scan' %}">Scan</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="scan-container">
        <!-- Manual Entry Section -->
        <div style="width: 100%; max-width: 800px; margin-bottom: 30px;">
            <div style="background: white; border-radius: 10px; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
                <h4 style="margin-bottom: 20px; color: #343a40;">
                    <i class="fas fa-keyboard me-2"></i>Manual Entry
                </h4>
                <div class="input-group" style="gap: 10px; display: flex;">
                    <input 
                        type="text" 
                        id="manualPlateInput" 
                        class="form-control" 
                        placeholder="Enter license plate (e.g., KAX123S)"
                        style="font-size: 1.1rem; padding: 12px; text-transform: uppercase;"
                    >
                    <button 
                        id="scanManualBtn" 
                        class="btn btn-success" 
                        style="padding: 12px 30px; font-size: 1.1rem; white-space: nowrap;"
                    >
                        <i class="fas fa-search me-2"></i>Scan
                    </button>
                </div>
            </div>
        </div>

        <!-- Camera Section -->
        <hr style="width: 100%; max-width: 800px; margin: 30px 0; color: #ccc;">
        <div style="width: 100%; max-width: 800px; text-align: center; margin-bottom: 20px;">
            <small style="color: #6c757d;">Or use camera to detect automatically</small>
        </div>

        <div id="cameraSection" style="width:100%;max-width:800px;">
            <div class="camera-container">
                <video id="videoElement" autoplay playsinline></video>
                <div class="scan-overlay"></div>
            </div>
            
            <div style="text-align:center;">
                <button id="startScan" class="btn btn-primary scan-button">
                    <i class="fas fa-camera me-2"></i>Start Scanning
                </button>
                <button id="stopScan" class="btn btn-danger scan-button" style="display: none;">
                    <i class="fas fa-stop me-2"></i>Stop Scanning
                </button>
            </div>
        </div>
        
        <div id="scanningStatus"></div>
        
        <div class="loading-spinner text-center">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <div class="result-container">
            <div class="result-card">
                <h3 class="result-title">Scan Result</h3>
                <div class="result-info">
                    License Plate: <strong id="plateNumber">-</strong>
                </div>
                <div class="result-info">
                    Status: <span id="insuranceStatus">-</span>
                    <span id="statusBadge" class="status-badge"></span>
                </div>
                <div class="result-info" id="expiryInfo" style="display: none;">
                    Insurance Expiry: <strong id="insuranceExpiry">-</strong>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio elements for feedback -->
    <audio id="successBeep" src="{% static 'scanner/sounds/success.mp3' %}" preload="auto"></audio>
    <audio id="errorBeep" src="{% static 'scanner/sounds/error.mp3' %}" preload="auto"></audio>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'scanner/script.js' %}"></script>
</body>
</html>
